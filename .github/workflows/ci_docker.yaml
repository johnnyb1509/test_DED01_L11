# FILE: .github/workflows/ci_docker.yml
name: CI Pipeline - FX Extractor

on:
  push:
    branches: [ "master" ]

jobs:
  # --- JOB 1: CHẠY BÀI TEST LOGIC ---
  test-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v3
      
      - name: Cài đặt Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Cài đặt thư viện
        run: |
          pip install -r requirements.txt
          pip install pytest
          
      - name: Thực thi Test
        run: pytest test_app.py -v
        
  # --- JOB 2: TEST ĐÓNG GÓI DOCKER ---
  build-docker:
    runs-on: ubuntu-latest
    needs: test-logic # CHỐT CHẶN: Chỉ chạy khi test-logic Pass!
    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v3
        
      - name: Build Docker Image để kiểm tra cú pháp
        run: docker build -t mindx_fx_worker:test .

      # MỚI: Đăng nhập vào Docker Hub bằng Secrets
      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # MỚI: Build và Push thẳng lên kho
      - name: Build và Push Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Gắn mác phiên bản là mã SHA của chính lần commit đó
          tags: mindx/fx-worker:${{ github.sha }}, mindx/fx-worker:latest